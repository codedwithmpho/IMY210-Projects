    <!-- Fan Club Sign-Up Form -->
	<div class="fanclub">
    <section class="fan_club_form">
        <h2>Join the Hill Climb Racing Fan Club!</h2>
        <p>Sign up to receive exclusive updates, news, and special offers.</p>
        <p>Fields marked with a * are required</p>
        
        <form action="results.html" method="post">
        	<fieldset>
        		<legend>Hill Climb Racing Fan Club</legend>
	            <!-- Name  -->
	            <label for="name">* Name:</label>
	            <input type="text" id="name" name="name" required><br><br>

	            <!-- Surname -->
	            <label for="name">* Surname:</label>
	            <input type="text" id="surname" name="surname" required><br><br>

	            <!-- Preferred Username -->
	            <label for="username">* Username:</label>
	            <input type="text" id="username" name="username" required><br><br>

	            <!-- Email Address -->
	            <label for="email">* Email Address:</label>
	            <input type="email" id="email" name="email" required><br><br>

	            <!-- Phone Number -->
	            <label for="phone">* Phone Number:</label>
	            <input type="tel" id="phone" name="phone"  maxlength="10" required><br><br>

	            <!-- Date of Birth -->
	            <label for="dob">* Date of Birth:</label>
	            <input type="date" id="dob" name="dob" required><br><br>

	            <!-- Preferred Contact Method -->
	            <label for="contact-method">* Preferred Contact Method:</label>
	            <select id="contact-method" name="contact-method">
	                <option value="email">Email</option>
	                <option value="whatsapp">WhatsApp</option>
	                <option value="sms">SMS</option>
	            </select><br><br>

	            <!-- Password -->
	            <label for="password">* Password:</label>
	            <input type="password" id="password" name="password" minlength="8" required><br><br>

	            <!-- Confirm Password -->
	            <label for="confirm-password">* Confirm Password:</label>
	            <input type="password" id="confirm-password" name="confirm-password" minlength="8" required><br><br>

	            <!-- Submit Button -->
	            <button type="submit" class="button">Sign Up</button>
            </fieldset>
        </form>
    </section>
